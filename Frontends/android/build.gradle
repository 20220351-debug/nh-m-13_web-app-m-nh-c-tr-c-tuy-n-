allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url = uri('https://storage.googleapis.com/download.flutter.io') }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
