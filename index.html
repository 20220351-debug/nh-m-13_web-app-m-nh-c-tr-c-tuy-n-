<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giới thiệu nhóm - Web App nghe nhạc</title>

  <!-- Font + Icon -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===== HERO ===== -->
<header class="hero">
  <div class="hero-content">
    <span class="badge">DCCNTT13.10.3</span>
    <h1>CHUYÊN ĐỀ 2</h1>
    <p>Đề tài: <strong>Web-app nghe nhạc trực tuyến</strong></p>
    <p class="sub">Giới thiệu thành viên nhóm</p>
  </div>
</header>

<!-- ===== MEMBERS ===== -->
<main>
  <section class="members">
    <h2><i class="fa-solid fa-users"></i> Thành viên nhóm</h2>

    <div class="grid">

      <!-- Member -->
      <div class="card leader">
        <span class="ribbon">Trưởng nhóm</span>

        <div class="avatar-box" onclick="upload('file1')">
          <img id="img1" src="photos/member1.jpg" onerror="this.src='placeholder.svg'">
          <div class="overlay"><i class="fa-solid fa-camera"></i></div>
        </div>

        <input type="file" id="file1" hidden onchange="preview(this,'img1')">

        <h3>Phạm Thùy Dương</h3>
        <p>MSSV: 20220351</p>
        <p>Lớp: DCCNTT13.10.3</p>
      </div>

      <!-- Member -->
      <div class="card">
        <div class="avatar-box" onclick="upload('file2')">
          <img id="img2" src="photos/member2.jpg" onerror="this.src='placeholder.svg'">
          <div class="overlay"><i class="fa-solid fa-camera"></i></div>
        </div>

        <input type="file" id="file2" hidden onchange="preview(this,'img2')">

        <h3>Nguyễn Lê Thùy Linh</h3>
        <p>MSSV: 20220345</p>
        <p>Lớp: DCCNTT13.10.3</p>
      </div>

    </div>
  </section>
</main>

<!-- ===== FOOTER ===== -->
<footer>
  <p>© 2026 Nhóm Chuyên Đề 2</p>
</footer>

<!-- ===== JS ===== -->
<script>
  function upload(id) {
    document.getElementById(id).click();
  }

  function preview(input, imgId) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById(imgId).src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
</script>

</body>
</html>
